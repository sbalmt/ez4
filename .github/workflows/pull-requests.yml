name: Pull requests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - ready_for_review
      - synchronize
      - opened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event.pull_request.draft == false && github.event.pull_request.fork == false)

    env:
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    services:
      dynamodb:
        image: amazon/dynamodb-local:3.3.0
        ports:
          - 8000:8000

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build all packages
        run: npm run build

      - name: Link all binaries
        run: npm link -w @ez4/project --prefer-offline --no-audit

      - name: Lint codebase
        run: npm run lint

      - name: Test foundation
        run: |
          npm test \
          -w @ez4/utils \
          -w @ez4/stateful \
          -w @ez4/reflection \
          -w @ez4/logger \
          -w @ez4/project \
          -w @ez4/schema \
          -w @ez4/validator \
          -w @ez4/transform

      - name: Test contracts
        run: |
          npm test \
          -w @ez4/gateway \
          -w @ez4/database \
          -w @ez4/cache \
          -w @ez4/scheduler \
          -w @ez4/storage \
          -w @ez4/distribution \
          -w @ez4/queue \
          -w @ez4/topic \
          -w @ez4/factory \
          -w @ez4/validation \
          -w @ez4/email

      - name: Test libraries
        run: |
          npm test \
          -w @ez4/pgsql \
          -w @ez4/pgclient \
          -w @ez4/pgmigration

      - name: Test local providers
        run: |
          npm test \
          -w @ez4/local-common \
          -w @ez4/local-gateway \
          -w @ez4/local-database \
          -w @ez4/local-cache \
          -w @ez4/local-scheduler \
          -w @ez4/local-storage \
          -w @ez4/local-queue \
          -w @ez4/local-topic

      - name: Test docs providers
        run: |
          npm test \
          -w @ez4/docs-gateway \
          -w @ez4/docs-database \
          -w @ez4/docs-topology

name: Pull requests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - ready_for_review
      - synchronize
      - opened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event.pull_request.draft == false && github.event.pull_request.fork == false)
    env:
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build all packages
        run: npm run build

      - name: Link all binaries
        run: npm link -w @ez4/project --prefer-offline --no-audit

      - name: Lint codebase
        run: npm run lint

      - name: Test package (@ez4/common)
        run: npm test -w @ez4/common
